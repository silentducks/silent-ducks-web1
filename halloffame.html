<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hall of Fame — Silent Ducks</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="images/Pato azul.ico">
<link rel="stylesheet" href="Style.css">
</head>
<body>

<div class="cursor" id="cursor"></div>
<div id="sparkles" style="position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;"></div>

<script>
const DUCK_B64 = "DUCK_PLACEHOLDER";
const LETTERS_B64 = "LETTERS_PLACEHOLDER";
const duckSrc = "data:image/png;base64," + DUCK_B64;
const lettersSrc = "data:image/png;base64," + LETTERS_B64;
</script>

<!-- NAV -->
<nav id="navbar" class="scrolled">
  <a href="index.html" class="nav-logo">
    <img class="nav-logo-duck" id="navDuck" src="" alt="Silent Ducks">
    <img class="nav-logo-text" id="navText" src="" alt="Silent Ducks">
  </a>
  <ul class="nav-links">
    <li><a href="index.html#events">Events</a></li>
    <li><a href="index.html#collabs">Collabs</a></li>
    <li><a href="sets.html">Sets</a></li>
    <li><a href="halloffame.html">Hall of fame</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-social">
    <!-- Instagram -->
    <a href="https://instagram.com/silentducks_" target="_blank" title="Instagram">
      <img src="images/instagram_black.png" alt="Instagram" style="width:20px; height:20px; object-fit:contain;">
    </a>
    <!-- SoundCloud -->
    <a href="https://soundcloud.com/silentducks" target="_blank" title="SoundCloud">
      <img src="images/test.png" alt="SoundCloud" style="width:20px; height:40px; object-fit:contain;">
    </a>
  </div>
</nav>

<!-- HALL OF FAME CONTENT -->
<section id="halloffame" style="padding-top: 140px; position: relative; z-index: 1;">
  <div style="max-width: 1200px; margin: 0 auto;">
    <div class="section-header">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;letter-spacing:3px;color:#00b4ff;text-transform:uppercase;margin-top:4px;">HALL OF FAME</div>
      <div class="section-line"></div>
    </div>

    <img src="images/contenido/quacksoon.png" alt="" style="width: 100%; max-width: 900px; height: auto; display: block; margin: 0 auto 60px; filter: drop-shadow(0 0 24px rgba(0,180,255,0.5)) drop-shadow(0 0 50px rgba(0,180,255,0.2));">

    <a href="index.html" class="btn-outline" style="display:inline-block; margin-top: 0;">← Main menu</a>
  </div>
</section>

<!-- FOOTER -->
<footer style="position: relative; z-index: 1;">
  <div class="footer-logo">
    <img class="footer-logo-duck" id="footerDuck" src="" alt="">
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
    <div class="footer-copy">© 2026 Silent Ducks. All rights reserved.</div>
    <div class="footer-copy">Version 0.1.4</div>
  </div>
  <div class="footer-loc">📍 Luxembourg</div>
</footer>

<script>
  // Inject logos
  document.getElementById('navDuck').src = "images/logo alargado blanco.png";
  document.getElementById('navText').src = "images/Pato azul.png";
  document.getElementById('footerDuck').src = "images/logo alargado blanco.png";

  // Custom cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('big'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
  });

  // Navbar scroll
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
  });

  // Sparkles
  const sp = document.getElementById('sparkles');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;background:${Math.random()>0.5?'#f5c518':'#00b4ff'};--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;
    sp.appendChild(s);
  }
</script>
</body>
</html>
