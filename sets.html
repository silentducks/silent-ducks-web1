<script>
  // Inject logos
  document.getElementById('navDuck').src = "images/logo alargado blanco.png";
  document.getElementById('navText').src = "images/Pato azul.png";
  document.getElementById('footerDuck').src = "images/logo alargado blanco.png";

  // Custom cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('big'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
  });

  // Navbar scroll
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
  });

  // Sparkles
  const sp = document.getElementById('sparkles');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;background:${Math.random()>0.5?'#f5c518':'#00b4ff'};--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;
    sp.appendChild(s);
  }

  // Genre filter
  function filterSets(btn, genre) {
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.set-card').forEach(card => {
      card.style.display = (genre === 'all' || card.dataset.genre === genre) ? 'block' : 'none';
    });
  }
</script>
